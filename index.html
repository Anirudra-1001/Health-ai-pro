<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HealthAI Pro - Ultimate</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(to right,#e3f2fd,#ffffff);
    transition:0.3s;
}

header{
    background:#1565c0;
    color:white;
    text-align:center;
    padding:15px;
}

.container{
    width:95%;
    max-width:700px;
    margin:20px auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 6px 20px rgba(0,0,0,0.1);
}

input, select{
    width:100%;
    padding:8px;
    margin:8px 0;
}

button{
    padding:10px;
    background:#1565c0;
    color:white;
    border:none;
    cursor:pointer;
    margin-top:5px;
    border-radius:5px;
}

button:hover{ background:#0d47a1; }

.hidden{ display:none; }

.chat-box{
    height:250px;
    overflow-y:auto;
    border:1px solid #ccc;
    padding:10px;
    margin-bottom:10px;
}

.user{ color:#0d47a1; margin:5px 0; }
.bot{ color:#2e7d32; margin:5px 0; }

.logout-btn{ background:#c62828; }
.clear-btn{ background:#6a1b9a; }
.dark-btn{ background:#424242; }
.emergency-btn{ background:#d32f2f; }

/* Dark Mode */
.dark{
    background:#121212;
    color:white;
}
.dark .container{ background:#1e1e1e; }
</style>
</head>
<body>

<header>
<h2>🏥 HealthAI Pro - Ultimate Version</h2>
</header>

<!-- AUTH -->
<div class="container" id="authSection">
<h3>Login / Register</h3>
<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">
<button onclick="register()">Register</button>
<button onclick="login()">Login</button>
<p id="authMsg"></p>
</div>

<!-- DASHBOARD -->
<div class="container hidden" id="dashboard">
<h3>Welcome <span id="userDisplay"></span></h3>

<button class="dark-btn" onclick="toggleDark()">🌙 Dark Mode</button>
<button onclick="startVoice()">🎤 Voice Input</button>
<button class="emergency-btn" onclick="emergency()">🚨 Emergency</button>

<select id="severity">
<option value="mild">Mild</option>
<option value="moderate">Moderate</option>
<option value="severe">Severe</option>
</select>

<input type="text" id="symptom" placeholder="Describe your symptom...">

<button onclick="analyze()">Analyze Symptom</button>

<div class="chat-box" id="chatBox"></div>

<button class="clear-btn" onclick="clearChat()">Clear Chat</button>
<button class="logout-btn" onclick="logout()">Logout</button>

<hr>

<!-- BMI CALCULATOR -->
<h3>BMI Calculator</h3>
<input type="number" id="height" placeholder="Height (cm)">
<input type="number" id="weight" placeholder="Weight (kg)">
<button onclick="calcBMI()">Calculate BMI</button>
<p id="bmiResult"></p>

</div>

<script>

/* AUTH SYSTEM */

function register(){
    let user = username.value;
    let pass = password.value;

    if(user && pass){
        localStorage.setItem(user, pass);
        authMsg.innerText="Registered Successfully!";
    } else {
        authMsg.innerText="Fill all fields!";
    }
}

function login(){
    let user = username.value;
    let pass = password.value;

    if(localStorage.getItem(user) === pass){
        sessionStorage.setItem("activeUser", user);
        showDashboard();
    } else {
        authMsg.innerText="Invalid Credentials!";
    }
}

function logout(){
    sessionStorage.removeItem("activeUser");
    location.reload();
}

function showDashboard(){
    let user=sessionStorage.getItem("activeUser");
    if(user){
        authSection.classList.add("hidden");
        dashboard.classList.remove("hidden");
        userDisplay.innerText=user;
        loadHistory();
    }
}

showDashboard();

/* SYMPTOM DATABASE */

const symptomsDB = {

stomach:{
    mild:"Drink warm water, eat light food like khichdi or banana, and avoid oily meals.",
    moderate:"Avoid spicy food, take ORS, and monitor for bloating or cramps. If persists for 2 days, consult a doctor.",
    severe:"🚨 Severe stomach pain or persistent vomiting may indicate infection or ulcers. Consult a Gastroenterologist immediately."
},

headache:{
    mild:"Rest in a quiet room, drink water, and avoid screen exposure.",
    moderate:"Reduce screen time, check sleep schedule, and try a cold compress on your forehead.",
    severe:"🚨 Sudden severe headache with nausea or blurred vision needs urgent medical attention. Visit a Neurologist."
},

fever:{
    mild:"Stay hydrated, take rest, and wear light clothing.",
    moderate:"Monitor temperature every 4 hours. Take paracetamol if needed and consult a doctor if fever lasts more than 2 days.",
    severe:"🚨 High fever above 103°F or with chills and rash requires immediate medical care. See a General Physician."
},

cold:{
    mild:"Steam inhalation and warm fluids like soup or herbal tea can help.",
    moderate:"Use saline nasal drops, rest well, and avoid cold beverages.",
    severe:"🚨 Difficulty breathing or chest tightness needs urgent care. Visit an ENT specialist."
},

cough:{
    mild:"Honey with warm water, avoid dust exposure, and stay hydrated.",
    moderate:"Avoid cold drinks, use steam inhalation, and monitor if cough lasts more than a week.",
    severe:"🚨 Persistent cough with blood or chest pain requires immediate medical evaluation."
},

chest:{
    mild:"Monitor closely, avoid heavy exertion, and practice deep breathing.",
    moderate:"Take rest and avoid stress. If pain spreads to arm or jaw, seek help immediately.",
    severe:"🚨 Possible heart emergency! Call emergency services immediately."
},

anxiety:{
    mild:"Practice deep breathing, short walks, and limit caffeine intake.",
    moderate:"Talk to someone you trust, try meditation, and maintain a regular sleep routine.",
    severe:"🚨 Severe anxiety or panic attacks affecting daily life require consultation with a mental health professional."
},

back:{
    mild:"Gentle stretching, maintain good posture, and use a warm compress.",
    moderate:"Avoid heavy lifting, try light yoga, and use ergonomic seating.",
    severe:"🚨 Severe back pain with numbness or leg weakness needs Orthopedic consultation."
},

skin:{
    mild:"Keep area clean and dry, avoid scratching, and use mild moisturizer.",
    moderate:"Use prescribed ointment and avoid allergens or harsh soaps.",
    severe:"🚨 Rapidly spreading rash, swelling, or fever requires Dermatologist consultation."
},

tooth:{
    mild:"Rinse with warm salt water and maintain oral hygiene.",
    moderate:"Avoid sweets and hot/cold foods, and schedule a dental checkup.",
    severe:"🚨 Severe tooth pain or swelling may indicate infection. Visit a Dentist immediately."
}

};

/* ANALYZE */

function analyze(){
let input = symptom.value.toLowerCase();
let severity = document.getElementById("severity").value;

if(!input) return;

chatBox.innerHTML += `<div class='user'>You: ${input} (${severity})</div>`;

let found=false;

for(let key in symptomsDB){
    if(input.includes(key)){
        let response=symptomsDB[key][severity];
        chatBox.innerHTML += `<div class='bot'>AI: ${response} 👨‍⚕️</div>`;
        saveHistory(input,response);
        found=true;
        break;
    }
}

if(!found){
chatBox.innerHTML += `<div class='bot'>AI: Symptom not recognized. Please consult a doctor.</div>`;
}

chatBox.scrollTop = chatBox.scrollHeight;
symptom.value="";
}

/* CHAT HISTORY */

function saveHistory(q,r){
let history=JSON.parse(localStorage.getItem("chatHistory"))||[];
history.push({question:q,response:r});
localStorage.setItem("chatHistory",JSON.stringify(history));
}

function loadHistory(){
let history=JSON.parse(localStorage.getItem("chatHistory"))||[];
history.forEach(item=>{
chatBox.innerHTML += `<div class='user'>You: ${item.question}</div>`;
chatBox.innerHTML += `<div class='bot'>AI: ${item.response}</div>`;
});
}

function clearChat(){
localStorage.removeItem("chatHistory");
chatBox.innerHTML="";
}

/* DARK MODE */

function toggleDark(){
    document.body.classList.toggle("dark");
}

/* VOICE INPUT */

function startVoice(){
    let recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = "en-US";

    recognition.onresult = function(event){
        symptom.value = event.results[0][0].transcript;
    };

    recognition.start();
}

/* BMI CALCULATOR */

function calcBMI(){
    let h = height.value / 100;
    let w = weight.value;
    if(!h || !w) return;

    let bmi = (w / (h*h)).toFixed(1);
    let status = bmi<18.5 ? "Underweight" :
                 bmi<25 ? "Normal" :
                 bmi<30 ? "Overweight" : "Obese";

    bmiResult.innerText = `BMI: ${bmi} (${status})`;
}

/* EMERGENCY */

function emergency(){
    alert("🚨 Call emergency services or visit nearest hospital immediately!");
}

</script>

</body>
</html>
